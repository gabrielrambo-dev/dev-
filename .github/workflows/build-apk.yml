name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar arquivos do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Conferir versões
        run: |
          node -v
          npm -v

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Instalar dependências
        run: npm install --legacy-peer-deps

      - name: Conferir Capacitor
        run: npx cap --version

      - name: Preparar pasta www
        run: |
          mkdir -p www
          cp -f index.html styles.css app.js data.js manifest.webmanifest sw.js www/
          mkdir -p www/icons
          cp -f icons/* www/icons/ || true

      - name: Criar Android
        run: |
          rm -rf android
          npx cap add android

      - name: Sincronizar Android
        run: npx cap sync android

      - name: Gerar APK debug
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Enviar APK como artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodeStudy-Pro-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
